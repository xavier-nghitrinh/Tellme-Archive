name: Update Folder List

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate folders.json and Update index.html
        run: |
          echo "[]" > folders.json
          # Use nullglob to avoid the loop running if no folders match the pattern
          shopt -s nullglob
          for folder_path in [0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]*/; do
            folder="${folder_path%/}"
            
            thumb=""
            # Try 1: Extract thumbnail from index.html if it exists
            if [ -f "$folder/index.html" ]; then
              thumb=$(grep -oP '"thumbnail":\s*"\K[^"]+' "$folder/index.html" 2>/dev/null | head -1 || echo "")
            fi
            
            # Try 2: Fallback to any image found in the folder
            if [ -z "$thumb" ]; then
              thumb=$(find "$folder" -type f \( -iname "*.jpg" -o -iname "*.png" -o -iname "*.webp" \) 2>/dev/null | head -1 | sed "s|^$folder/||" || echo "")
            fi
            
            # Update the JSON file
            jq --arg name "$folder" --arg thumb "$thumb" '. += [{name: $name, thumbnail: $thumb}]' folders.json > tmp.json && mv tmp.json folders.json
          done
          
          # Safely inject the JSON into index.html using an environment variable and '|' delimiter
          export JSON_DATA=$(cat folders.json)
          perl -0777 -pi -e 's|(<script id="folder-data" type="application/json">).*?(</script>)|$1\n        $ENV{JSON_DATA}\n    $2|sg' index.html
          
      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add folders.json index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update folders list and homepage" && git push)
