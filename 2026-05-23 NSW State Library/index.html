    "transcript": "Bức phác thảo sơn dầu này, mang tên \"Sự thành lập Úc\" của Algernon Talmage, được tạo ra vào năm 1937 và mua lại vào năm 2000, không chỉ là một tác phẩm nghệ thuật mà còn là một tấm gương phản chiếu sâu sắc về sự chia rẽ lịch sử. Nó được ủy quyền bởi Douglas Hope Johnston, một hậu duệ của sĩ quan Hạm đội Đầu tiên và người sáng lập Câu lạc bộ Tiên phong Australasia, nhằm tái hiện ngày đầu tiên của Hạm đội Đầu tiên tại Warrane / Sydney Cove, kỷ niệm 150 năm sự kiện đổ bộ. Bức tranh mô tả khoảnh khắc Thống đốc Arthur Phillip, trung tâm của cảnh, nâng ly chúc mừng Vua George III vào ngày 26 tháng 1 năm 1788. Điều đáng chú ý là vào năm 1938, khi bức tranh mang tính \"khải hoàn\" này được vẽ, phần lớn người Úc muốn tôn vinh điều mà họ coi là vinh quang của cuộc xâm lược và thuộc địa hóa. Đây là thời điểm Đế quốc Anh tự tin nhất. Tuy nhiên, cùng năm đó, một sự kiện đối lập mạnh mẽ đã diễn ra: Hội nghị Thổ dân Úc về Ngày Tang lễ và Phản đối tại Sydney, cũng vào ngày 26 tháng 1. Sự kiện này không chỉ là đỉnh điểm của các phong trào phản kháng trước đó mà còn được coi là một khoảnh khắc mang tính bước ngoặt trong cuộc đấu tranh giành quyền của các nhà hoạt động Thổ dân. Dòng chữ \"200 NĂM\" ở cuối tấm biển càng nhấn mạnh chiều sâu thời gian và ý nghĩa lịch sử của những sự kiện này, cho thấy rõ ràng một sự thật lịch sử bị che giấu, nơi một sự kiện được kỷ niệm như một chiến thắng lại đồng thời là nguồn gốc của sự đau khổ và phản kháng.\n\n---\n\nQ: ngày 26 tháng 1 năm 1788 là ngày chiếc thuyền đầu tiên của thực dân Anh đến Úc hay sao\n\n---\n\nNgày 26 tháng 1 năm 1788 là ngày Thống đốc Arthur Phillip chính thức tuyên bố chủ quyền của Anh đối với New South Wales tại Sydney Cove, đánh dấu sự khởi đầu của quá trình thuộc địa hóa Úc. Đây là ngày mà Hạm đội Đầu tiên của Anh, mang theo những tù nhân và người định cư, đã hoàn tất hành trình và thiết lập khu định cư châu Âu đầu tiên trên lục địa này.\n\n---\n\nQ: Tóm tắt lịch sử trước giai đoạn đó\n\n---\n\nTrước giai đoạn đó, lục địa Úc đã là quê hương của các dân tộc Thổ dân và Torres Strait Islander trong ít nhất 65.000 năm. Họ phát triển các nền văn hóa phong phú, đa dạng, với hệ thống xã hội phức tạp, kiến thức sâu rộng về đất đai, và truyền thống truyền miệng được truyền từ thế hệ này sang thế hệ khác. Mặc dù các nhà thám hiểm châu Âu đã tiếp cận bờ biển Úc từ thế kỷ 17, như Willem Janszoon của Hà Lan vào năm 1606, nhưng không có nỗ lực định cư lâu dài nào được thực hiện cho đến khi James Cook tuyên bố chủ quyền New South Wales cho Vương quốc Anh vào năm 1770. Quyết định thành lập một thuộc địa hình sự tại Úc được đưa ra sau khi Anh mất các thuộc địa ở Bắc Mỹ, tạo nhu cầu tìm một nơi mới để giam giữ tù nhân.\n\n---\n\nQ: Hội thời đó các vị lãnh đạo suy nghĩ như thế nào về việc suốt ngày đi tìm thuộc địa Nhưng chỉ để giam giữ tù nhân là sao\n\n---\n\nVào thời điểm đó, các nhà lãnh đạo Anh nhìn nhận việc thiết lập thuộc địa hình sự ở Úc không chỉ đơn thuần là nơi giam giữ tù nhân. Đó là một giải pháp đa chiều cho nhiều vấn đề cấp bách. Thứ nhất, nó giải quyết tình trạng quá tải nhà tù nghiêm trọng ở Anh sau khi mất các thuộc địa ở Bắc Mỹ. Thứ hai, việc đưa tù nhân đến một vùng đất xa xôi giúp loại bỏ họ khỏi xã hội Anh, giảm bớt gánh nặng xã hội và chi phí. Thứ ba, có một tầm nhìn chiến lược dài hạn hơn: biến những tù nhân này thành lực lượng lao động để xây dựng một thuộc địa mới, khai thác tài nguyên và mở rộng ảnh hưởng của Đế quốc Anh. Mặc dù ban đầu là một thuộc địa hình sự, ý định cuối cùng là biến nó thành một khu định cư thịnh vượng, đóng vai trò như một tiền đồn quân sự và thương mại quan trọng ở Thái Bình Dương, đặc biệt để cạnh tranh với các cường quốc châu Âu khác. Do đó, nó không chỉ là một nhà tù khổng lồ mà còn là một dự án địa chính trị đầy tham vọng.\n\n---\n\nQ: Như vậy là 18 năm sau khi Cook đến New South Wales thì mới tuyên bố thành lập chủ quyền kể chi tiết theo về ngày 26 tháng 01 vì sao được chọn là ngày quốc khánh như vậy nsw có phải là vùng đất đầu tiên thực dân Anh đến trước các bang khác không\n\n---\n\nĐúng vậy, 18 năm sau khi James Cook tuyên bố chủ quyền New South Wales cho Anh vào năm 1770, việc thành lập thuộc địa chính thức mới diễn ra vào ngày 26 tháng 1 năm 1788. Ngày này được chọn làm Ngày Úc (Australia Day) vì đây là thời điểm Hạm đội Đầu tiên dưới sự chỉ huy của Thuyền trưởng Arthur Phillip đổ bộ thành công xuống Sydney Cove và Thống đốc Phillip chính thức cắm cờ Anh, tuyên bố thành lập thuộc địa New South Wales. Đây là sự kiện khai sinh ra khu định cư châu Âu đầu tiên trên lục địa này. New South Wales (NSW) chính là vùng đất đầu tiên mà thực dân Anh đến và thiết lập thuộc địa. Ban đầu, thuộc địa NSW bao trùm gần như toàn bộ phần phía đông của lục địa Úc, bao gồm cả các khu vực mà sau này trở thành Queensland, Victoria và một phần của Nam Úc. Các bang khác như Tasmania (ban đầu là Van Diemen's Land), Tây Úc, và Nam Úc được thành lập và thuộc địa hóa sau đó, với những thời điểm và lý do khác nhau. Việc chọn ngày 26 tháng 1 làm Ngày Úc là một vấn đề gây tranh cãi sâu sắc. Đối với nhiều người Úc gốc châu Âu, đây là ngày kỷ niệm sự ra đời của quốc gia hiện đại, tượng trưng cho sự khởi đầu của một xã hội đa văn hóa và thịnh vượng. Tuy nhiên, đối với người Thổ dân và Torres Strait Islander, ngày này được gọi là \"Ngày Xâm lược\" (Invasion Day) hoặc \"Ngày Sống sót\" (Survival Day). Nó đại diện cho sự khởi đầu của quá trình thuộc địa hóa tàn khốc, mất mát đất đai, văn hóa, và sự đàn áp kéo dài hàng thế kỷ. Cuộc tranh luận về ý nghĩa của ngày này vẫn tiếp diễn mạnh mẽ, phản ánh những vết thương lịch sử chưa lành và sự cần thiết phải hòa giải giữa các cộng đồng.\n\n---\n\nQ: Đâu là tên tuổi của các lãnh đạo từ Đế Quốc nổi tiếng nhất và những hoạt động xâm lược của họ tàn ác đến mức độ nào\n\n---\n\nTrong lịch sử Đế quốc Anh, có nhiều nhân vật lãnh đạo nổi tiếng gắn liền với các hoạt động mở rộng thuộc địa. Một trong số đó là **Thủ tướng William Pitt Trẻ**, người đã lãnh đạo Anh trong giai đoạn cuối thế kỷ 18 và đầu thế kỷ 19, khi đế quốc này đang củng cố vị thế toàn cầu và mở rộng sang Úc. **Thủ tướng Benjamin Disraeli** vào thế kỷ 19 cũng là một kiến trúc sư chủ chốt của chủ nghĩa đế quốc, đặc biệt với việc mua cổ phần Kênh đào Suez và đưa Nữ hoàng Victoria lên ngôi Hoàng hậu Ấn Độ, biểu tượng cho sự thống trị của Anh. Về mức độ tàn ác của các hoạt động xâm lược, cần nhìn nhận rằng chủ nghĩa thực dân thường đi kèm với những hành vi bạo lực và áp bức nghiêm trọng. 1.  **Chiếm đoạt đất đai và tài nguyên:** Ở Úc, việc chiếm đất của người Thổ dân diễn ra trên quy mô lớn, thường thông qua bạo lực, lừa dối hoặc các hiệp ước không công bằng. Điều này dẫn đến sự mất mát sinh kế, văn hóa và kết nối tâm linh sâu sắc của người bản địa với đất đai. 2.  **Bạo lực và diệt chủng:** Có nhiều báo cáo về các cuộc thảm sát người Thổ dân, đặc biệt trong các cuộc \"chiến tranh biên giới\" khi người định cư châu Âu mở rộng lãnh thổ. Các bệnh dịch từ châu Âu cũng tàn phá các cộng đồng bản địa vốn không có khả năng miễn dịch. 3.  **Phá hoại văn hóa và xã hội:** Chính sách đồng hóa đã cấm đoán ngôn ngữ, tín ngưỡng và phong tục của người Thổ dân. \"Thế hệ bị đánh cắp\" (Stolen Generations) là một ví dụ điển hình, khi trẻ em Thổ dân bị tách khỏi gia đình và cộng đồng để được \"giáo dục\" theo kiểu phương Tây, gây ra những tổn thương tâm lý và xã hội sâu sắc kéo dài đến ngày nay. 4.  **Chế độ nô lệ và lao động cưỡng bức:** Mặc dù không phải là nô lệ theo nghĩa truyền thống, nhiều người bản địa bị buộc phải làm việc trong các trang trại, hầm mỏ hoặc làm người hầu với điều kiện sống khắc nghiệt và không được trả lương công bằng. Tóm lại, các hoạt động xâm lược của Đế quốc Anh, đặc biệt ở Úc, đã gây ra những hậu quả thảm khốc cho người bản địa, từ mất mát sinh mạng, đất đai, văn hóa đến những tổn thương kéo dài nhiều thế hệ.\n\n---\n\nQ: Chỉ nói trong bối cảnh Út thì đâu là các lãnh đạo từ Đế Quốc Anh đến đây và họ đã làm những gì tàn ác nhất đối với dân thổ dân ở đây\n\n---\n\nTrong bối cảnh Úc, các lãnh đạo từ Đế quốc Anh đến đây thường là các Thống đốc thuộc địa hoặc những người có vai trò quan trọng trong việc thiết lập và quản lý các khu định cư. Một trong số những người đầu tiên và nổi bật nhất là **Thống đốc Arthur Phillip**, người đã dẫn dắt Hạm đội Đầu tiên và thành lập thuộc địa New South Wales. Dù ban đầu Phillip có ý định thiết lập mối quan hệ hòa bình với người Thổ dân, nhưng áp lực từ những người định cư và quan điểm chủ nghĩa thượng đẳng chủng tộc thời bấy giờ đã dẫn đến những chính sách và hành động tàn khốc. Những hành động tàn ác nhất đối với dân Thổ dân dưới sự lãnh đạo của các quan chức thuộc địa Anh bao gồm: 1.  **Chiếm đoạt đất đai không bồi thường:** Đây là hành động cơ bản và tàn khốc nhất. Người Anh tuyên bố \"terra nullius\" (đất trống không chủ), phớt lờ quyền sở hữu đất đai của người Thổ dân đã tồn tại hàng chục nghìn năm. Việc này đã phá hủy nền tảng kinh tế, xã hội và tâm linh của các cộng đồng bản địa, đẩy họ vào cảnh nghèo đói và mất mát bản sắc. 2.  **Thảm sát và bạo lực có hệ thống:** Mặc dù không phải lúc nào cũng do lệnh trực tiếp từ các Thống đốc, nhưng các cuộc thảm sát người Thổ dân bởi những người định cư và lực lượng cảnh sát thuộc địa là phổ biến. Ví dụ nổi bật là **Thảm sát Myall Creek năm 1838**, nơi 11 người Thổ dân không vũ trang bị giết hại dã man. Mặc dù một số kẻ gây án bị xét xử và treo cổ, nhưng đây chỉ là một trong rất nhiều vụ việc tương tự diễn ra trên khắp lục địa. 3.  **Chính sách \"diệt chủng văn hóa\" và đồng hóa cưỡng bức:** Các chính sách của chính quyền thuộc địa sau này, đặc biệt là vào cuối thế kỷ 19 và đầu thế kỷ 20, đã dẫn đến việc thành lập các \"khu bảo tồn\" và \"truyền giáo\" nơi người Thổ dân bị buộc phải sống, bị cấm nói ngôn ngữ của mình, thực hành văn hóa và tín ngưỡng truyền thống. 4.  **\"Thế hệ bị đánh cắp\" (Stolen Generations):** Đây là một trong những chương đen tối nhất. Từ khoảng năm 1900 đến 1970, hàng chục nghìn trẻ em Thổ dân và Torres Strait Islander bị chính quyền và các tổ chức tôn giáo cưỡng bức tách khỏi gia đình với lý do \"bảo vệ\" hoặc \"đồng hóa\". Mục đích là để chúng quên đi nguồn gốc bản địa và hòa nhập vào xã hội da trắng. Hành động này đã gây ra những tổn thương tâm lý, xã hội và văn hóa sâu sắc, kéo dài qua nhiều thế hệ. Các lãnh đạo thuộc địa, dù có ý định cá nhân như thế nào, đều là một phần của hệ thống đế quốc tin vào quyền tối thượng của mình và đã thực thi các chính sách dẫn đến sự tàn phá không thể phục hồi đối với các dân tộc bản địa Úc.\n\n---\n\nQ: Ngoài Arthur Phillip còn những tên tuổi nào nữa\n\n---\n\nNgoài Arthur Phillip, còn một số tên tuổi lãnh đạo và quan chức thuộc địa khác cũng đóng vai trò quan trọng trong việc định hình chính sách và cách đối xử với người Thổ dân ở Úc, dù không phải lúc nào cũng trực tiếp liên quan đến các hành động tàn ác mà thường là qua việc ban hành hoặc thực thi các chính sách. **Lachlan Macquarie:** Thống đốc New South Wales từ năm 1810 đến 1821, Macquarie được coi là một trong những Thống đốc có ảnh hưởng nhất. Mặc dù ông có những nỗ lực ban đầu để \"văn minh hóa\" người Thổ dân bằng cách thành lập các trường học và khu định cư cho họ, nhưng chính sách của ông cũng bao gồm việc sử dụng vũ lực khi người Thổ dân chống lại sự xâm lấn của người định cư. Đáng chú ý, năm 1816, ông đã ra lệnh cho quân đội tiến hành một cuộc hành quân trừng phạt, dẫn đến thảm sát ở Appin, nơi nhiều người Thổ dân bị giết hại. **George Arthur:** Trung tá Thống đốc Van Diemen's Land (Tasmania) từ năm 1824 đến 1836. Ông là người chịu trách nhiệm chính cho \"Chiến tranh Đen\" (Black War) và \"Đường Đen\" (Black Line) khét tiếng. Mục tiêu của \"Đường Đen\" là dồn toàn bộ người Thổ dân Tasmania vào một bán đảo nhỏ, nhưng thực tế đã dẫn đến việc săn lùng và giết hại gần như toàn bộ dân số Thổ dân bản địa ở Tasmania, một trong những ví dụ điển hình nhất về diệt chủng trong lịch sử Úc. **George Grey:** Thống đốc Nam Úc từ năm 1841 đến 1845, và sau đó là Thống đốc New Zealand và Cape Colony (Nam Phi). Grey là người ủng hộ mạnh mẽ chính sách đồng hóa, tin rằng cách tốt nhất để \"cứu\" người Thổ dân là tách họ khỏi văn hóa truyền thống và giáo dục họ theo cách của người châu Âu. Mặc dù có vẻ \"nhân đạo\" hơn các chính sách bạo lực trực tiếp, nhưng chính sách đồng hóa của ông đã đặt nền móng cho việc phá hủy văn hóa và xã hội Thổ dân, dẫn đến các chính sách như \"Thế hệ bị đánh cắp\" sau này. Những nhân vật này, cùng với nhiều quan chức và người định cư khác, đã góp phần vào việc thiết lập một hệ thống thuộc địa mà ở đó quyền lợi và sự tồn tại của người Thổ dân bị coi nhẹ, dẫn đến những hậu quả tàn khốc kéo dài đến ngày nay.\n\n---\n\nQ: Vậy đến khi nào thì các chính sách hoặc là góc nhìn của người da trắng về người thổ dân mới trở nên nhân từ bác ái hơn\n\n---\n\nGóc nhìn và chính sách của người da trắng đối với người Thổ dân ở Úc đã trải qua một quá trình thay đổi chậm chạp và đầy khó khăn, và có thể nói rằng sự \"nhân từ, bác ái\" thực sự vẫn còn là một mục tiêu đang được theo đuổi. Những thay đổi đáng kể bắt đầu xuất hiện từ giữa thế kỷ 20: 1.  **Thập niên 1960:** Đây là một thập kỷ bản lề. *   **Năm 1962:** Người Thổ dân lần đầu tiên được quyền bỏ phiếu đầy đủ trong các cuộc bầu cử liên bang. *   **Năm 1967:** Một cuộc trưng cầu dân ý toàn quốc đã được tổ chức, với tỷ lệ ủng hộ áp đảo (90.77%) việc sửa đổi Hiến pháp để cho phép chính phủ liên bang ban hành luật cho người Thổ dân và tính họ vào số liệu thống kê dân số quốc gia. Đây là một bước ngoặt lớn, chấm dứt tình trạng người Thổ dân bị coi là \"không phải con người\" trong thống kê. 2.  **Thập niên 1970:** *   **Năm 1972:** Chính phủ của Gough Whitlam đã thành lập Bộ Các vấn đề Thổ dân và bắt đầu các chính sách tự quyết cho người bản địa, bao gồm việc trả lại một số quyền đất đai. *   **Năm 1976:** Đạo luật Quyền đất đai Thổ dân (Bắc Úc) được thông qua, là đạo luật liên bang đầu tiên công nhận quyền đất đai của người bản địa. 3.  **Thập niên 1990:** *   **Năm 1992:** Tòa án Tối cao Úc ra phán quyết lịch sử trong vụ **Mabo v Queensland (No 2)**, bác bỏ học thuyết \"terra nullius\" (đất trống không chủ) và công nhận quyền sở hữu đất đai bản địa (native title) của người Thổ dân. *   **Năm 1997:** Báo cáo \"Bringing Them Home\" được công bố, điều tra về \"Thế hệ bị đánh cắp\" và khuyến nghị chính phủ xin lỗi. *   **Năm 1998:** \"Ngày Quốc gia Xin lỗi\" (National Sorry Day) đầu tiên được tổ chức. 4.  **Thế kỷ 21:**\n    *   **Năm 2008:** Thủ tướng Kevin Rudd đã đưa ra lời xin lỗi chính thức của chính phủ liên bang trước Quốc hội về \"Thế hệ bị đánh cắp\" và những chính sách sai lầm trong quá khứ.\n    *   **Hiện tại:** Vẫn còn nhiều cuộc đấu tranh cho công lý, bình đẳng và hòa giải. Các vấn đề như bất bình đẳng về sức khỏe, giáo dục, việc làm, tỷ lệ giam giữ cao và quyền đại diện chính trị vẫn là những thách thức lớn. Cuộc thảo luận về việc thay đổi ngày Quốc khánh (Australia Day) và việc công nhận người Thổ dân trong Hiến pháp (thông qua \"Tiếng nói Thổ dân vào Quốc hội\" - Indigenous Voice to Parliament) cho thấy quá trình này vẫn đang tiếp diễn.\n\nTóm lại, sự thay đổi trong góc nhìn và chính sách đã diễn ra dần dần, nhưng phải đến nửa sau của thế kỷ 20 mới có những bước tiến đáng kể. Tuy nhiên, để đạt được sự \"nhân từ, bác ái\" toàn diện và công bằng thực sự, xã hội Úc vẫn còn một chặng đường dài phía trước.",

    "transcript": "Bộ ảnh \"Một Nơi Chung: Chân dung người Murries ở Moree, 1990\" của Michael Riley không chỉ là những bức ảnh đơn thuần; đó là một tấm gương phản chiếu sâu sắc về cộng đồng Thổ dân tại Moree, phía bắc New South Wales, được thực hiện bởi một người con của chính họ. Riley, một nghệ sĩ Thổ dân (1960-2004), đã kiến tạo chuỗi tác phẩm này vào năm 1990 bằng cách dựng một studio ngoài trời ngay trong thị trấn, mời gọi các thành viên cộng đồng đến để ghi lại hình ảnh của họ. Điều đặc biệt là nhiều người trong số các đối tượng chụp ảnh chính là họ hàng của ông, tạo nên một sự kết nối cá nhân và chân thực hiếm có, vượt xa một dự án tài liệu thông thường. Thư viện đã mua phần lớn bộ sưu tập này từ Boomalli Aboriginal Artists Co-operative vào năm 1993, nơi Riley là một thành viên sáng lập, khẳng định tầm quan trọng của việc bảo tồn di sản văn hóa này. Đến năm 2016, năm bức ảnh còn thiếu đã được bổ sung dưới dạng bản in lưu trữ, hoàn thiện một bộ sưu tập vô giá. Trong số các chân dung nổi bật, chúng ta thấy Carmine và Lyall Munro, một bản in ảnh được mua vào năm 1993, mang số hiệu PXA 591/no 9. Kế đến là Nanny Wright cùng chú chó của bà, được biết đến là Maude Wright, cũng là một bản in ảnh từ năm 1993 với số hiệu PXA 591/no 8. Cuối cùng, bức ảnh \"Những người phụ nữ Moree\" khắc họa các Trưởng lão từ Phái bộ Mehi Crescent ở Moree, bao gồm bà Jenkins, Ruth Roberts, Mary Stanley, Maude Wright, bà Fernando và Dotti Sampson, một bản in ảnh khác cũng được mua vào năm 1993 với số hiệu PXA 591/no 10. Những tác phẩm này không chỉ là ghi chép lịch sử mà còn là lời khẳng định mạnh mẽ về danh tính và sự hiện diện của một cộng đồng.",

    "transcript": "Tấm bản đồ cơ thể người này không chỉ là một nghiên cứu giải phẫu, mà còn là một tấm gương phản chiếu lịch sử đau thương và kiên cường của cộng đồng queer trong cuộc chiến chống lại HIV/AIDS, đồng thời thách thức quan niệm về sự thật khách quan trong khoa học. \"The Pharmacological Body: AIDS/PrEP Map\" năm 2023 của Jeremy Smith là một bản đồ phản-địa lý chủ quan được vẽ tay, bác bỏ ý tưởng bản đồ là ghi chép trung lập. Thay vào đó, nó là một câu chuyện quan hệ, nơi ý nghĩa hình thành từ cơ thể nghệ sĩ, ký ức cộng đồng queer và các hệ thống y sinh. Smith đã dựa trên một bản khắc giải phẫu thời Phục hưng từ tác phẩm \"De humani corporis fabrica\" năm 1543 của Andreas Vesalius – một công trình mang tính cách mạng, lần đầu tiên mô tả khoa học đầy đủ và chính xác về giải phẫu người với những hình minh họa chưa từng có. Tuy nhiên, Smith đã vẽ lại hình ảnh đó theo chiều cao 185 cm của chính mình, biến một cơ thể khoa học lý tưởng thành một cơ thể queer, sống động. Các tĩnh mạch xanh nhạt trên bản đồ của Smith theo dõi PrEP, loại thuốc dự phòng HIV mà ông đang dùng, trong khi các tĩnh mạch đỏ vẽ lại lịch sử HIV/AIDS ở Sydney. Tác phẩm này được Thư viện NSW mua lại vào năm 2023, bổ sung vào bộ sưu tập phong phú về lịch sử queer, hoạt động vì quyền người đồng tính nam, và tác động của HIV/AIDS từ những năm 1980-1990. Nó tạo không gian độc đáo để suy ngẫm về cuộc sống của người đồng tính nam và những người khác bị ảnh hưởng bởi HIV ở Úc trong bốn thập kỷ thay đổi. AIDS đã cướp đi sinh mạng 40 triệu người và lây nhiễm 100 triệu người trên toàn cầu, một thống kê làm sụp đổ ý tưởng COVID-19 là cuộc khủng hoảng sức khỏe lớn đầu tiên trong 100 năm. Đây không chỉ là một tác phẩm nghệ thuật; nó là một tuyên ngôn về cách lịch sử, dịch bệnh và sự sống còn định hình nên cơ thể và bản sắc của chúng ta.",

    "preview": "Tấm bản đồ cơ thể người này không chỉ là một nghiên cứu giải phẫu, mà còn là một tấm gương phản chiếu lịch sử đau thương và kiên cường của cộng đồng queer trong cuộc chiến chống lại HIV/AIDS, đồng thời thách thức quan niệm về sự thật khách quan trong khoa học. \"The Pharmacological Body: AIDS/PrEP Map\" năm 2023 của Jeremy Smith là một bản đồ phản-địa lý chủ quan được vẽ tay, bác bỏ ý tưởng bản đồ là ghi chép trung lập. Thay vào đó, nó là một câu chuyện quan hệ, nơi ý nghĩa hình thành từ cơ thể nghệ sĩ, ký ức cộng đồng queer và các hệ thống y sinh. Smith đã dựa trên một bản khắc giải phẫu thời Phục hưng từ tác phẩm \"De humani corporis fabrica\" năm 1543 của Andreas Vesalius – một công trình mang tính cách mạng, lần đầu tiên mô tả khoa học đầy đủ và chính xác về giải phẫu người với những hình minh họa chưa từng có. Tuy nhiên, Smith đã vẽ lại hình ảnh đó theo chiều cao 185 cm của chính mình, biến một cơ thể khoa học lý tưởng thành một cơ thể queer, sống động. Các tĩnh mạch xanh nhạt trên bản đồ của Smith theo dõi PrEP, loại thuốc dự phòng HIV mà ông đang dùng, trong khi các tĩnh mạch đỏ vẽ lại lịch sử HIV/AIDS ở Sydney. Tác phẩm này được Thư viện NSW mua lại vào năm 2023, bổ sung vào bộ sưu tập phong phú về lịch sử queer, hoạt động vì quyền người đồng tính nam, và tác động của HIV/AIDS từ những năm 1980-1990. Nó tạo không gian độc đáo để suy ngẫm về cuộc sống của người đồng tính nam và những người khác bị ảnh hưởng bởi HIV ở Úc trong bốn thập kỷ thay đổi. AIDS đã cướp đi sinh mạng 40 triệu người và lây nhiễm 100 triệu người trên toàn cầu, một thống kê làm sụp đổ ý tưởng COVID-19 là cuộc khủng hoảng sức khỏe lớn đầu tiên trong 100 năm. Đây không chỉ là một tác phẩm nghệ thuật; nó là một tuyên ngôn về cách lịch sử, dịch bệnh và sự sống còn định hình nên cơ thể và bản sắc của chúng ta."

    "transcript": "Bức in về Luna Park của Martin Sharp không chỉ là một tác phẩm nghệ thuật, mà còn là lời tự sự đầy ám ảnh về thảm kịch. Nó khắc họa biểu tượng của Sydney, Luna Park, nhưng lại ẩn chứa nỗi đau từ vụ hỏa hoạn tàu ma năm 1979 đã cướp đi bảy sinh mạng. Sharp, người từng góp phần hồi sinh lối vào công viên năm 1973, tin rằng vụ cháy là \"đáng ngờ và nham hiểm\". Tác phẩm với \"hai mặt đối lập\" này phản ánh sự giằng xé nội tâm của ông: nỗi buồn sâu sắc về thảm họa và niềm tin kiên định vào \"sứ quán của sự mê hoặc\" mà Luna Park đại diện. Đây là tiếng nói của một nghệ sĩ đã đấu tranh không ngừng để bảo tồn công viên sau khi nó bị đóng cửa và đấu giá các tài sản, một minh chứng cho mối liên hệ cá nhân sâu sắc của ông với nơi này. Kế đến là bức thư minh họa của Brett Whiteley gửi mẹ mình, Beryl, vào năm 1981, một viên ngọc quý hé lộ khía cạnh thân mật của một trong những nghệ sĩ nổi tiếng nhất nước Úc. Đây không phải là một bức thư thông thường, mà là một bản vẽ đầy ắp những mẩu tin gia đình: từ niềm hân hoan khi vẽ tranh giữa thiên nhiên, bơi lội hàng giờ ở Bondi, đến nỗi lo lắng về con gái Arkie và nhu cầu cao đối với tác phẩm của ông. Nó mở ra một cánh cửa hiếm hoi vào thế giới riêng tư của Whiteley, cung cấp một bức chân dung chân thực, gần gũi hơn về con người đằng sau danh tiếng lẫy lừng mà những tác phẩm công cộng của ông không thể truyền tải hết. Cuối cùng, bức ảnh \"Brett Whiteley tại Bonython Gallery Sydney, 1974\" của Lewis Morley là một lát cắt lịch sử, ghi lại khoảnh khắc Whiteley trong một bối cảnh quan trọng của sự nghiệp. Nó đóng băng hình ảnh của một nghệ sĩ đang ở đỉnh cao, được chụp bởi một nhiếp ảnh gia tài ba, tại một trong những phòng trưng bày danh tiếng nhất Sydney thời bấy giờ. Bức ảnh này không chỉ là một tài liệu; nó là một minh chứng cho sự hiện diện và ảnh hưởng của Whiteley trong giới nghệ thuật Úc vào thập niên 70.",

    "transcript": "Bắt đầu với những chai lọ được trang trí bằng lưỡi câu cá, chúng không chỉ là vật phẩm nghệ thuật mà còn là lời phê phán sâu sắc về di sản thực dân, đại diện cho \"những nhân vật khai quốc\" như Cook, đồng thời gợi nhắc về nguồn hải sản dồi dào tại Kamay/Botany Bay đã bị tước đoạt. Những yếu tố điêu khắc gợi hình hài cốt người xung quanh chúng là lời nhắc nhở lạnh lùng về vai trò của những người này trong cái chết của người bản địa Aboriginal, và việc sử dụng chai cũ nhấn mạnh vai trò hủy hoại của rượu trong quá trình thuộc địa hóa. Tiếp theo, nhật ký của Ralph Clark, một sĩ quan Thủy quân lục chiến trong Hạm đội Đầu tiên, là một bức chân dung đầy cảm xúc về nỗi nhớ gia đình và khát vọng thăng tiến, chứa đựng cả lọn tóc của con trai ông. Dù ông ca ngợi Port Jackson là \"nơi đẹp nhất\", Clark lại là người phức tạp: nhạy cảm với cảm xúc của mình nhưng khắc nghiệt và thờ ơ trước hoàn cảnh của người khác, một mâu thuẫn sâu sắc của thời kỳ đó. Arthur Bowes-Smyth, bác sĩ phẫu thuật trên tàu Lady Penrhyn, cũng ghi lại hành trình của mình trong ba phiên bản nhật ký, một trong số đó được minh họa chi tiết, tiết lộ những quan điểm gay gắt của ông về các quyết định của Thống đốc Phillip. Ông thậm chí còn vẽ cây cỏ bản địa với hy vọng tìm ra công dụng chữa bệnh, cho thấy sự kết hợp giữa khoa học và khám phá trong những ngày đầu thuộc địa. Cuối cùng, bức tranh màu nước về vụ bắt giữ Thống đốc Bligh năm 1808 là một điểm nhấn gây tranh cãi, được tạo ra ngay sau khi ông bị lật đổ. Tác phẩm này, từng được trưng bày công khai trong nhà một kẻ nổi loạn, đã miêu tả sai lệch Bligh như một kẻ hèn nhát. Cháu trai của người lãnh đạo cuộc đảo chính, Thiếu tá George Johnston, đã tặng nó cho chính phủ NSW vào năm 1988 như một bằng chứng lịch sử, nhưng một cháu trai khác của Bligh lại kịch liệt phản đối vào năm 1995, gọi đó là \"lời nói dối trắng trợn\" và \"vu khống ác ý\", cho thấy cách lịch sử được viết lại và tranh cãi qua nhiều thế hệ.\n\n---\n\nQ: Thống đốc Bligh là ai làm gì mà bị lật đổ\n\n---\n\nThống đốc Bligh, tên đầy đủ là William Bligh (1754-1817), là một sĩ quan hải quân nổi tiếng của Anh. Ông được biết đến nhiều nhất qua hai sự kiện lớn: vụ binh biến trên tàu HMS Bounty vào năm 1789 và vụ lật đổ ông khỏi chức vụ Thống đốc New South Wales vào năm 1808, còn gọi là \"Cuộc nổi loạn Rum\". Bligh được bổ nhiệm làm Thống đốc New South Wales vào năm 1806, với nhiệm vụ chính là chấm dứt nạn tham nhũng và kiểm soát việc buôn bán rượu rum trái phép trong thuộc địa, đặc biệt là từ Quân đoàn New South Wales (NSW Corps). Quân đoàn này, còn được gọi là \"Quân đoàn Rum\", đã tích lũy quyền lực và tài sản khổng lồ thông qua việc độc quyền buôn bán rượu rum và các hoạt động bất hợp pháp khác. Ngay từ khi nhậm chức, Bligh đã thực hiện nhiều biện pháp cứng rắn để kiểm soát Quân đoàn NSW và các nhà buôn giàu có, đặc biệt là John Macarthur, một sĩ quan và nhà kinh doanh len có ảnh hưởng lớn. Những chính sách này đã gây ra sự đối đầu gay gắt. Bligh bị cho là độc đoán, nóng nảy và thiếu khéo léo trong giao tiếp, khiến ông mất lòng cả giới quân sự và dân sự. Đỉnh điểm của mâu thuẫn là khi Bligh ra lệnh bắt giữ Macarthur vì tội chống đối chính quyền. Điều này đã châm ngòi cho cuộc nổi loạn. Vào ngày 26 tháng 1 năm 1808, Quân đoàn NSW, dưới sự chỉ huy của Thiếu tá George Johnston, đã hành quân đến Dinh Thống đốc và bắt giữ Bligh. Ông bị giam giữ trong hơn một năm trước khi được đưa trở về Anh. Vụ lật đổ Bligh là một sự kiện độc nhất vô nhị trong lịch sử thuộc địa Anh, khi một thống đốc bị quân đội của chính mình phế truất. Nó phơi bày những căng thẳng sâu sắc về quyền lực, tham nhũng và sự kiểm soát trong những ngày đầu của thuộc địa Úc.\n\n---\n\nQ: Tại sao rượu rum lại có quyền lực lớn đến vậy ở New South Wales?\n\n---\n\nQuyền lực của rượu rum ở New South Wales thời kỳ đầu thuộc địa là một hiện tượng độc đáo, xuất phát từ nhiều yếu tố kinh tế, xã hội và chính trị. Thứ nhất, **thiếu tiền tệ chính thức**. Thuộc địa New South Wales ban đầu gần như không có tiền tệ lưu hành. . Rượu rum, đặc biệt là loại rượu mạnh chất lượng cao, nhanh chóng trở thành một dạng tiền tệ không chính thức, được chấp nhận rộng rãi trong các giao dịch mua bán, trao đổi hàng hóa và dịch vụ. Thậm chí, lương bổng của binh lính và công nhân cũng thường được trả bằng rượu rum. Thứ hai, **nhu cầu cao và nguồn cung hạn chế**. Cuộc sống khắc nghiệt, cô lập và thiếu thốn ở thuộc địa khiến rượu rum trở thành một thứ xa xỉ phẩm được khao khát để giải sầu, thư giãn hoặc đơn giản là để làm ấm cơ thể. Do không có khả năng sản xuất rượu quy mô lớn tại chỗ, nguồn cung rượu rum phụ thuộc hoàn toàn vào các chuyến tàu từ bên ngoài, khiến nó trở nên quý giá và dễ dàng bị độc quyền. Thứ ba, **sự thao túng của Quân đoàn New South Wales (NSW Corps)**. Quân đoàn này, được cử đến để duy trì trật tự, nhanh chóng nhận ra tiềm năng kinh tế khổng lồ của rượu rum. Họ đã thiết lập một mạng lưới độc quyền buôn bán rượu rum, nhập khẩu số lượng lớn và bán lại với giá cắt cổ. Điều này không chỉ mang lại lợi nhuận khổng lồ cho các sĩ quan và binh lính mà còn cho họ quyền lực kinh tế và xã hội to lớn. Bằng cách kiểm soát nguồn cung rượu rum, họ có thể kiểm soát cả nền kinh tế và cuộc sống của người dân thuộc địa. Thứ tư, **kiểm soát lao động**. Rượu rum được dùng như một công cụ để khuyến khích hoặc trừng phạt lao động, đặc biệt là những người bị kết án. Việc được thưởng rượu rum có thể là động lực mạnh mẽ để họ làm việc chăm chỉ hơn. Vì những lý do này, rượu rum không chỉ là một loại đồ uống mà còn là xương sống của nền kinh tế, là biểu tượng của quyền lực và là nguyên nhân sâu xa dẫn đến các cuộc xung đột chính trị, đỉnh điểm là vụ lật đổ Thống đốc Bligh.",

      dRow.style.display='';
      var pfx=_selYear+'-'+_selMonth;
      var dys2=allDates.filter(function(d){ return d.startsWith(pfx); }).map(function(d){ return d.slice(8,10); }).filter(function(dy,i,a){ return a.indexOf(dy)===i; }).sort();
      dys2.forEach(function(dy){
        var fullDate=_selYear+'-'+_selMonth+'-'+dy;
        var lbl2=dayLabels[fullDate];
        var btnLabel=lbl2 ? dy+' · '+lbl2 : dy;
        dRow.appendChild(_pillBtn(btnLabel,_selDay===dy,function(){
          _selDay=dy; _renderFilter(); renderList(fullDate);
        }));
      });
    } else { dRow.style.display='none'; }
  }

  function getOptimalPartition(items) {
    let remaining = items.length;
    let partition = [];
    let lastPick = -1;
    let currentIdx = 0;
    const isP = (item) => {
      if (!item) return false;
      if (item._aspect) return item._aspect < 0.85;
      if (item.aspect < 0.85 || item.orientation === 'portrait') return true;
      return false; 
    };
    while (remaining > 0) {
      const sizes = [5, 4, 3, 2];
      let choices = sizes.filter(s => s <= remaining && (remaining - s !== 1 || remaining - s === 0));
      choices = choices.filter(s => {
        if (s < 4) return true;
        for (let k = 0; k < s; k++) {
          if (isP(items[currentIdx + k])) return false;
        }
        return true;
      });
      if (choices.length === 0) {
        partition.push(remaining);
        break;
      }
      let pick = choices[0];
      if (choices.length > 1) {
        if (choices[0] === lastPick) pick = choices[1];
      }
      partition.push(pick);
      remaining -= pick;
      currentIdx += pick;
      lastPick = pick;
    }
    return partition;
  }

  function computeBentoLayoutSpans(items) {
    const isP = (item) => {
      if (!item) return false;
      if (item._aspect) return item._aspect < 0.85;
      if (item.aspect < 0.85 || item.orientation === 'portrait') return true;
      return false; 
    };
    const optimalGroups = getOptimalPartition(items);
    let finalSpans = [];
    let itemIdx = 0;
    optimalGroups.forEach((groupSize) => {
      let groupItems = items.slice(itemIdx, itemIdx + groupSize);
      let pStates = groupItems.map(isP);
      let pCount = pStates.filter(v => v).length;
      let groupSpans = [];
      if (groupSize === 1) {
        if (pStates[0]) groupSpans = ["md:col-span-16 md:row-span-2 sm:col-span-16 h-[600px] portrait-pillar-container"];
        else groupSpans = ["md:col-span-16 md:row-span-2 sm:col-span-16 h-[520px] hero-card-mobile"];
      } 
      else if (groupSize === 2) {
        if (pCount === 1) {
          if (pStates[0]) groupSpans = ["md:col-span-4 md:row-span-2 sm:col-span-16 h-[520px]", "md:col-span-12 md:row-span-2 sm:col-span-16 h-[520px]"];
          else groupSpans = ["md:col-span-12 md:row-span-2 sm:col-span-16 h-[520px]", "md:col-span-4 md:row-span-2 sm:col-span-16 h-[520px]"];
        } else {
          groupSpans = ["md:col-span-8 md:row-span-2 sm:col-span-16 h-[520px]", "md:col-span-8 md:row-span-2 sm:col-span-16 h-[520px]"];
        }
      }
      else if (groupSize === 3) {
        if (pCount === 3) groupSpans = ["md:col-span-5 md:row-span-2 sm:col-span-16 h-[520px]", "md:col-span-6 md:row-span-2 sm:col-span-16 h-[520px]", "md:col-span-5 md:row-span-2 sm:col-span-16 h-[520px]"];
        else if (pCount === 2) {
          if (!pStates[0]) groupSpans = ["md:col-span-8 md:row-span-2", "md:col-span-4 md:row-span-2", "md:col-span-4 md:row-span-2"];
          else if (!pStates[1]) groupSpans = ["md:col-span-4 md:row-span-2", "md:col-span-8 md:row-span-2", "md:col-span-4 md:row-span-2"];
          else groupSpans = ["md:col-span-4 md:row-span-2", "md:col-span-4 md:row-span-2", "md:col-span-8 md:row-span-2"];
          groupSpans = groupSpans.map(s => s + " sm:col-span-16 h-[520px]");
        } else if (pCount === 1) {
          if (pStates[0]) groupSpans = ["md:col-span-4 md:row-span-2", "md:col-span-6 md:row-span-2", "md:col-span-6 md:row-span-2"];
          else if (pStates[1]) groupSpans = ["md:col-span-6 md:row-span-2", "md:col-span-4 md:row-span-2", "md:col-span-6 md:row-span-2"];
          else groupSpans = ["md:col-span-6 md:row-span-2", "md:col-span-6 md:row-span-2", "md:col-span-4 md:row-span-2"];
          groupSpans = groupSpans.map(s => s + " sm:col-span-16 h-[520px]");
        } else {
          if (itemIdx % 2 === 0) groupSpans = ["md:col-span-10 md:row-span-2 sm:col-span-16 h-[520px]", "md:col-span-6 md:row-span-1 sm:col-span-16 h-[250px]", "md:col-span-6 md:row-span-1 sm:col-span-16 h-[250px]"];
          else groupSpans = ["md:col-span-6 md:row-span-1 sm:col-span-16 h-[250px]", "md:col-span-10 md:row-span-2 sm:col-span-16 h-[520px]", "md:col-span-6 md:row-span-1 sm:col-span-16 h-[250px]"];
        }
      }
      else if (groupSize === 4) {
        groupSpans = ["md:col-span-12 md:row-span-2 sm:col-span-16 h-[520px]", "md:col-span-4 md:row-span-1 sm:col-span-16 h-[250px]", "md:col-span-4 md:row-span-1 sm:col-span-16 h-[250px]", "md:col-span-16 md:row-span-2 sm:col-span-16 h-[520px] hero-card-mobile"];
      }
      else if (groupSize === 5) {
        groupSpans = ["md:col-span-10 md:row-span-2 sm:col-span-16 h-[520px]", "md:col-span-6 md:row-span-1 sm:col-span-16 h-[250px]", "md:col-span-3 md:row-span-1 sm:col-span-8 h-[250px]", "md:col-span-3 md:row-span-1 sm:col-span-8 h-[250px]", "md:col-span-16 md:row-span-2 sm:col-span-16 h-[520px] hero-card-mobile"];
      }
      finalSpans = finalSpans.concat(groupSpans);
      itemIdx += groupSize;
    });
    return finalSpans;
  }

  function formatTimestamp(isoString) {
    if (!isoString) return "";
    const d = new Date(isoString);
    return String(d.getDate()).padStart(2, '0') + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + d.getFullYear() + ' ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  }

  function escHtml(s){ 
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                    .replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>')
                    .replace(/\*([^*\n]+)\*/g,'<em>$1</em>')
                    .replace(/\n/g,'<br>');
  }

  function renderList(date) {
    currentPageItems = (byDate[date] || []).slice();
    galleryContainer.innerHTML = '';
    const dayLabel = dayLabels[date] || "";
    dayDescriptionLabel.textContent = dayLabel ? date + " · " + dayLabel : date;
    if (!currentPageItems.length) {
      galleryContainer.innerHTML = '<div class="col-span-16 text-center py-20 text-gray-500">No captures for this day.</div>';
      return;
    }
    currentPageItems.forEach(item => {
      if (item._aspect) return;
      const img = new Image();
      img.src = item.imageUrl;
      if (img.complete && img.width > 0) { item._aspect = img.width / img.height; }
      else { img.onload = () => { item._aspect = img.width / img.height; if (item._aspect < 1) renderList(date); }; }
    });
    const layoutSpans = computeBentoLayoutSpans(currentPageItems);
    let htmlLines = [];
    currentPageItems.forEach((item, index) => {
      const spanClass = layoutSpans[index] || "md:col-span-4 md:row-span-1 sm:col-span-16 h-[250px] md:h-auto";
      const isHero = spanClass.includes("md:col-span-16");
      const isPortraitPillar = spanClass.includes("portrait-pillar-container");
      let cleanTranscript = (item.preview || item.transcript || "").split('[FQ:')[0].replace(/\[TITLE:[\s\S]*?\]/, '').replace(/\*([^*]+)\*/g, '$1').trim();
      const imgClass = isPortraitPillar ? "w-auto h-full max-h-full object-contain transition-transform duration-700 ease-out group-hover:scale-105" : "absolute inset-0 w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-105";
      if (isHero) {
        htmlLines.push('<div class="glow-card ' + spanClass + ' relative overflow-hidden rounded-3xl bg-slate-900 border border-gray-800/80 group cursor-pointer flex flex-col justify-end transition-all duration-300" onclick="activeOpenLightbox(' + index + ')">' +
            (isPortraitPillar ? '' : '<img class="' + imgClass + '" src="' + item.imageUrl + '" alt="' + (item.title || '') + '" loading="lazy">') +
            (isPortraitPillar ? '<div class="flex-1 flex justify-center bg-[#0b0f1a] overflow-hidden"><img class="' + imgClass + '" src="' + item.imageUrl + '" alt="' + (item.title || '') + '" loading="lazy"></div>' : '') +
            '<div class="absolute inset-0 bg-gradient-to-t from-slate-950/80 via-slate-950/20 to-transparent opacity-90 group-hover:opacity-100 transition-opacity" style="background-image: linear-gradient(to top, rgba(2, 6, 23, 0.9) 0%, rgba(2, 6, 23, 0.4) 30%, transparent 45%);"></div>' +
            '<div class="relative z-10 p-8">' +
              '<h2 class="text-base md:text-2xl font-bold text-white group-hover:text-purple-300 transition-colors line-clamp-1 drop-shadow-md">' + (item.title || '') + '</h2>' +
              '<p class="text-xs md:text-sm text-gray-200 mt-2 opacity-90 leading-relaxed line-clamp-2 drop-shadow-sm">' + cleanTranscript + '</p>' +
            '</div>' +
          '</div>');
      } else {
        htmlLines.push('<div class="glow-card ' + spanClass + ' relative overflow-hidden rounded-3xl bg-slate-900 border border-gray-800/80 group cursor-pointer flex flex-col justify-end p-6 transition-all duration-300" onclick="activeOpenLightbox(' + index + ')">' +
            '<img class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-105" src="' + item.imageUrl + '" alt="' + (item.title || '') + '" loading="lazy">' +
            '<div class="absolute inset-0 bg-gradient-to-t from-slate-950/80 via-transparent to-transparent opacity-90 group-hover:opacity-100 transition-opacity" style="background-image: linear-gradient(to top, rgba(2, 6, 23, 0.9) 0%, rgba(2, 6, 23, 0.4) 35%, transparent 50%);"></div>' +
            '<div class="relative z-10 p-2 rounded-xl backdrop-blur-[1px] bg-slate-950/10">' +
              '<h2 class="text-base font-bold text-white group-hover:text-purple-300 transition-colors line-clamp-1 drop-shadow-md">' + (item.title || '') + '</h2>' +
              '<p class="text-xs text-gray-300 mt-1.5 opacity-80 group-hover:opacity-100 transition-opacity leading-relaxed line-clamp-2 drop-shadow-sm">' + cleanTranscript + '</p>' +
            '</div>' +
          '</div>');
      }
    });
    galleryContainer.innerHTML = htmlLines.join('');
  }

  window.activeOpenLightbox = function(index) { currentActiveIndex = index; openLightbox(currentPageItems[index]); };

  function renderLightboxCarousel() {
    lightboxCarousel.innerHTML = '';
    currentPageItems.forEach(function(item, idx) {
      const thumb = document.createElement('div');
      thumb.className = 'carousel-thumb shrink-0 w-14 h-14 rounded-lg overflow-hidden border-2 border-transparent cursor-pointer relative ' + (idx === currentActiveIndex ? 'active' : 'opacity-50 hover:opacity-100');
      thumb.innerHTML = '<img src="' + item.thumbnail + '" alt="" class="w-full h-full object-cover">';
      thumb.addEventListener('click', function() { currentActiveIndex = idx; openLightbox(currentPageItems[idx]); });
      lightboxCarousel.appendChild(thumb);
    });
    const activeThumb = lightboxCarousel.children[currentActiveIndex];
    if (activeThumb) { lightboxCarousel.scrollTo({ left: activeThumb.offsetLeft - (lightboxCarousel.clientWidth / 2) + (activeThumb.clientWidth / 2), behavior: 'smooth' }); }
  }

  function openLightbox(item) {
    lightboxImg.src = item.imageUrl;
    ambientGlow.style.backgroundImage = `url(${item.imageUrl})`;
    lightboxTitleTop.textContent = item.title || "";
    var locParts = [];
    if (item.location) {
      if (item.location.district) locParts.push(item.location.district);
      if (item.location.city && item.location.city !== item.location.district) locParts.push(item.location.city);
      if (item.location.state) locParts.push(item.location.state);
      if (item.location.country) locParts.push(item.location.country);
    }
    lightboxLocation.textContent = locParts.join(', ') || "";
    lightboxDate.textContent = formatTimestamp(item.timestamp);
    lightboxIndexBadge.textContent = (currentActiveIndex + 1) + '/' + currentPageItems.length;

    if (item.originalUrl) {
      lightboxUrlContainer.classList.remove('hidden');
      lightboxUrl.href = item.originalUrl;
      let dUrl = item.originalUrl.replace(/^https?:\/\//, '').replace(/\/$/, '');
      if (dUrl.length > 64) dUrl = dUrl.substring(0, 61) + '...';
      lightboxUrl.textContent = dUrl;
    } else {
      lightboxUrlContainer.classList.add('hidden');
    }

    const fullText = item.transcript || '';
    // Support both string and array transcript formats
    if (Array.isArray(fullText)) {
      // Array format: items are {type:'text',role,text} or {type:'pic',picId,dataUrl}
      let mainStory = '';
      const firstText = fullText.find(function(x) { return x.type === 'text' && x.role === 'model'; });
      if (firstText) {
        mainStory = (firstText.text || '').replace(/\[TITLE:[\s\S]*?\]/, '').split('[FQ:')[0].trim();
      }
      lightboxStoryText.innerHTML = escHtml(mainStory);
      lightboxQATurns.innerHTML = '';
      // Render remaining items
      fullText.forEach(function(item2, idx2) {
        if (idx2 === 0 && item2.type === 'text' && item2.role === 'model') return; // already in mainStory
        if (item2.type === 'pic') {
          const picDiv = document.createElement('div');
          picDiv.className = 'my-2';
          const picImg = document.createElement('img');
          picImg.src = item2.dataUrl || '';
          picImg.style.cssText = 'width:94%;margin:0 3%;border-radius:8px;display:block;';
          picImg.alt = '';
          picDiv.appendChild(picImg);
          lightboxQATurns.appendChild(picDiv);
        } else if (item2.type === 'text') {
          if (item2.role === 'user') {
            const userBubble = document.createElement('div');
            userBubble.className = "flex justify-end pt-1";
            userBubble.innerHTML = '<div class="bg-purple-600/15 border border-purple-500/20 text-purple-300 text-xs rounded-2xl rounded-tr-none px-4 py-2.5 max-w-[85%] shadow-md">' +
              escHtml(item2.text || '') + '</div>';
            lightboxQATurns.appendChild(userBubble);
          } else {
            const aiBubble = document.createElement('div');
            aiBubble.className = "space-y-1.5 pt-1";
            const cleanLine = (item2.text || '').replace(/\[TITLE:[\s\S]*?\]/, '').split('[FQ:')[0].trim();
            aiBubble.innerHTML = '<div class="bg-gray-950/50 border border-gray-900 text-gray-300 text-xs rounded-2xl rounded-tl-none px-4 py-3 text-justify leading-relaxed">' +
              escHtml(cleanLine) + '</div>';
            lightboxQATurns.appendChild(aiBubble);
          }
        }
      });
    } else {
      // Legacy string format
      const mainParts = fullText.split('\n\n---\n\n');
      let mainStory = mainParts[0] || '';
      mainStory = mainStory.replace(/\[TITLE:[\s\S]*?\]/, '').split('[FQ:')[0].trim();
      lightboxStoryText.innerHTML = escHtml(mainStory);
      lightboxQATurns.innerHTML = '';
      if (mainParts.length > 1) {
        mainParts.slice(1).forEach(part => {
          if (!part.trim()) return;
          const lines = part.split('\n');
          lines.forEach(line => {
            if (line.startsWith('Q:')) {
              const userBubble = document.createElement('div');
              userBubble.className = "flex justify-end pt-1";
              userBubble.innerHTML = '<div class="bg-purple-600/15 border border-purple-500/20 text-purple-300 text-xs rounded-2xl rounded-tr-none px-4 py-2.5 max-w-[85%] shadow-md">' +
                  line.replace('Q:', '').split('[FQ:')[0].trim() +
                '</div>';
              lightboxQATurns.appendChild(userBubble);
            } else if (line.trim().length > 0 && !line.includes('[FQ:')) {
              const aiResponseBubble = document.createElement('div');
              aiResponseBubble.className = "space-y-1.5 pt-1";
              aiResponseBubble.innerHTML = '<div class="bg-gray-950/50 border border-gray-900 text-gray-300 text-xs rounded-2xl rounded-tl-none px-4 py-3 text-justify leading-relaxed">' +
                  escHtml(line) +
                '</div>';
              lightboxQATurns.appendChild(aiResponseBubble);
            }
          });
        });
      }
    }
    renderLightboxCarousel();
    screenList.classList.add('opacity-40', 'pointer-events-none');
    screenLightbox.classList.remove('hidden'); screenLightbox.classList.add('flex');
    setTimeout(() => { lightboxImg.classList.remove('scale-95'); lightboxImg.classList.add('scale-100'); }, 50);
    history.pushState({ lightboxOpen: true }, '');
    // Reset scroll positions to top when opening a new item
    const mainScroll = document.getElementById('lightbox-main-container');
    if (mainScroll) mainScroll.scrollTop = 0;
    const rightCol = document.getElementById('lightbox-right-column');
    if (rightCol) rightCol.scrollTop = 0;
  }

  function closeLightbox() {
    lightboxImg.classList.remove('scale-100'); lightboxImg.classList.add('scale-95');
    screenList.classList.remove('opacity-40', 'pointer-events-none');
    screenLightbox.classList.add('hidden'); screenLightbox.classList.remove('flex');
  }

  btnCloseLightbox.addEventListener('click', () => { closeLightbox(); if (history.state && history.state.lightboxOpen) { history.back(); } });

  function navigateLightbox(direction) {
    if (currentPageItems.length === 0) return;
    if (direction === 'next') currentActiveIndex = (currentActiveIndex + 1) % currentPageItems.length;
    else if (direction === 'prev') currentActiveIndex = (currentActiveIndex - 1 + currentPageItems.length) % currentPageItems.length;
    lightboxImg.style.opacity = '0.3';
    setTimeout(() => { openLightbox(currentPageItems[currentActiveIndex]); lightboxImg.style.opacity = '1'; }, 120);
  }

  btnPrev.addEventListener('click', () => navigateLightbox('prev'));
  btnNext.addEventListener('click', () => navigateLightbox('next'));

  // MOBILE SWIPE GESTURES
  let touchStartX = 0, touchStartY = 0, touchEndX = 0, touchEndY = 0;
  const swipeMinX = 60; // minimum horizontal distance
  const swipeMaxY = 40; // maximum vertical deviation
  const lightboxMain = document.getElementById('screen-lightbox');
  
  lightboxMain.addEventListener('touchstart', e => { 
    touchStartX = e.changedTouches[0].screenX; 
    touchStartY = e.changedTouches[0].screenY;
  }, { passive: true });

  lightboxMain.addEventListener('touchend', e => { 
    touchEndX = e.changedTouches[0].screenX; 
    touchEndY = e.changedTouches[0].screenY;
    handleSwipe(); 
  }, { passive: true });

  function handleSwipe() {
    const dx = touchEndX - touchStartX;
    const dy = touchEndY - touchStartY;
    const absX = Math.abs(dx);
    const absY = Math.abs(dy);

    // Confidence: Horizontal move must be strong AND 
    // the movement must be significantly more horizontal than vertical (Ratio check)
    if (absX < swipeMinX) return;
    if (absY > absX * 0.5) return; // Skip if it's too "diagonal" or mostly vertical
    if (absY > swipeMaxY) return;  // Skip if vertical movement is too high

    if (dx > 0) navigateLightbox('prev');
    else navigateLightbox('next');
  }

  document.addEventListener('keydown', (e) => {
    if (!screenLightbox.classList.contains('hidden')) {
      if (e.key === 'ArrowRight') navigateLightbox('next');
      else if (e.key === 'ArrowLeft') navigateLightbox('prev');
      else if (e.key === 'Escape') closeLightbox();
    }
  });

  window.addEventListener('popstate', (e) => { if (screenLightbox.classList.contains('flex')) closeLightbox(); });

  if (allDates.length) {
    var _last=allDates[allDates.length-1];
    _selYear=_last.slice(0,4); _selMonth=_last.slice(5,7); _selDay=_last.slice(8,10);
    _renderFilter(); renderList(_last);
  } else { galleryContainer.innerHTML = '<div class="col-span-12 text-center py-20 text-gray-500">No data in this export.</div>'; }

  const mainHeader = document.getElementById('main-header');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 100) { mainHeader.classList.add('header-collapsed'); }
    else { mainHeader.classList.remove('header-collapsed'); }
  }, { passive: true });
})();
</script>
</body>
