                height: 160px !important;
            }
        }

        /* Essential Tailwind fallback colors */
        .bg-gray-900 { background-color: #111827; }
        .bg-purple-600 { background-color: #7c3aed; }
        .text-purple-300 { color: #d8b4fe; }
        .text-purple-400 { color: #c084fc; }
        .text-gray-100 { color: #f3f4f6; }
        .text-gray-400 { color: #9ca3af; }
        .text-gray-500 { color: #6b7280; }
        .text-white { color: #ffffff; }
    </style>
</head>
<body class="bg-mesh text-gray-100 min-h-screen font-sans antialiased">

<div class="max-w-5xl mx-auto px-6 py-12 md:py-24">
    <!-- Hero Section -->
    <header class="mb-16 text-center animate-fade-in">
        <div class="inline-flex items-center gap-3 mb-6 px-4 py-2 rounded-full glassmorphism">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-purple-600 to-pink-500 flex items-center justify-center shadow-lg shadow-purple-500/20">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 100-6 3 3 0 000 6z"/>
                </svg>
            </div>
            <span class="text-sm font-medium tracking-wide text-purple-300">My Memories Archive</span>
        </div>
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight bg-gradient-to-r from-white via-gray-200 to-gray-500 bg-clip-text text-transparent mb-6">
            TellMe Hub
        </h1>
        <p class="text-gray-400 text-lg max-w-2xl mx-auto leading-relaxed">
            Exploring stories, one day at a time. Select a date below to revisit shared moments.
        </p>
    </header>

    <!-- Navigation / Selectors -->
    <div class="space-y-12 mb-20">
        <!-- Year Selector -->
        <section id="year-section" class="animate-slide-up" style="animation-delay: 0.1s">
            <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-gray-500 mb-6 text-center">Select Year</h2>
            <div id="year-container" class="flex flex-wrap justify-center gap-3">
                <!-- Years inserted here -->
            </div>
        </section>

        <!-- Month Selector -->
        <section id="month-section" class="hidden animate-slide-up" style="animation-delay: 0.2s">
            <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-gray-500 mb-6 text-center">Select Month</h2>
            <div id="month-container" class="flex flex-wrap justify-center gap-3">
                <!-- Months inserted here -->
            </div>
        </section>

        <!-- Day Selector -->
        <section id="day-section" class="hidden animate-slide-up" style="animation-delay: 0.3s">
            <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-gray-500 mb-6 text-center">Available Stories</h2>
            <div id="day-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Days inserted here -->
            </div>
        </section>
    </div>

    <!-- Loading / Error States -->
    <div id="status-container" class="text-center py-20 hidden">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-purple-500 mb-4"></div>
        <p class="text-gray-500 italic" id="status-text">Scanning folders...</p>
    </div>

    <!-- Footer -->
    <footer class="mt-32 pt-12 border-t border-gray-800/40 text-center animate-fade-in" style="animation-delay: 0.5s">
        <p class="text-gray-500 text-sm">
            &copy; 2026 TellMe Archive. Automatically updated.
        </p>
    </footer>
</div>

<script>
    const CONFIG = {
        // Only if hosted on GitHub, we can try to auto-detect
        owner: '', 
        repo: '',
        isLocal: window.location.protocol === 'file:',
        isGithub: window.location.hostname.endsWith('github.io')
    };

    let folders = [];
    let state = {
        year: null,
        month: null
    };

    async function init() {
        console.log("Initializing Journey Hub...");
        showStatus(true, "Discovering folders...");
        
        try {
            // Priority 0: Inline JSON (to bypass CORS on local file system)
            const inlineData = document.getElementById('folder-data');
            if (inlineData && inlineData.textContent.trim().length > 2) {
                try {
                    folders = JSON.parse(inlineData.textContent);
                    console.log("Loaded folders from inline JSON:", folders.length);
                } catch (e) {
                    console.error("Failed to parse inline JSON:", e);
                }
            }

            // Priority 1: GitHub API (if on GitHub Pages)
            if (folders.length === 0 && CONFIG.isGithub) {
                console.log("Checking GitHub API...");
                // ...
            }

            // Priority 2: Try fetching folders.json (fallback for local or non-Github)
            if (folders.length === 0) {
                console.log("Attempting to fetch folders.json...");
                try {
                    const response = await fetch('folders.json');
                    console.log("folders.json response:", response.status, response.ok);
                    if (response.ok || response.status === 0) {
                        const data = await response.json();
                        console.log("Parsed folders.json, count:", data ? data.length : 0);
                        if (Array.isArray(data)) {
                            folders = data;
                        }
                    }
                } catch (e) {
                    console.log("Local fetch of folders.json failed/blocked:", e.message);
                }
            }

            // Fallback for demo/dev only if we still have no folders
            if (folders.length === 0) {
                console.warn("No folders discovered via API or JSON, using hardcoded demos.");
                folders = [
                    {
                        name: "2026-06-04 Kobe Wagyu Yakiniku",
                        thumbnail: "data:image/webp;base64,UklGRsorAABXRUJQVlA4WAoAAAAgAAAAKwEAFAIASUNDUMgBAAAAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADZWUDgg3CkAABDzAJ0BKiwBFQI+tVilTaclI6wjs0tZgBaJZW3IyJOztghidnktXzKxzCqz8ei0UHfID5Tzf/gePvuS+dd9eb0BfNdWyxl/CblHuDmsgzX7TrryoX+v40f4j/p9MZ4H/3f/3cFUh2P5Qi1KV3+MKFAkqoyBmJujTgjggef/DGxFIIj/lA/gXB7u0XO/5eetbC1tZy44K4Mp/uobEZmH8fzdGCP7mwFtb3gnGo+9b42EvcMgdOYMZEtl9ql8T/WCmGO3NdIUR7TPGNi32EYF1IhYVz05IeoywBRWQns7wihSa5i6dWFzAHONMy+oMuSKbVbj+nMKckhrF/KHgaXzjWRXQZCyAqBrWRTbf3tD4mnF6ehurNrVPIBiO4qw2VvXRPZFfMozbSFg9qxSQrgPVxSox4T09zs2MSHgLqK+gJRJT9D0wxF4304dIaJ7ikRRoXozHns+l9Am7qjjV6gNqSv0HL0XgoWp+aqicfNAtE7eyTW0Kv/S/YQVdUTm/ClaiRIjBPWUMlhFd4EsDV68TfMy+PN1lMHt9HMEMhzZrBfzeV72X823/5Ks3R5kHPdpTaOKYM0b2uvB19XvvSawyXrUDT51f1GeuxtYfZT14I/IqTjwMFeCOi4649dZursx6kDH6k5EyOpb2hOhupGRnxlAkMHoWh3x/Y3OTof1ycNR1Zo5rOnAvf/Soh6eqbl9GHTZ13AXs22/TtrRYw0s0OvKWGirjx+ijkvb9csLiOF66gyWtX4npYVKDePC215BTYI4+GmFcYrG3pYfFywA8mulXV3fxqDE2iTzuqnmSIddPNkaE3eZCcOtBKEDK2Q17YfaPa5YV1rSYHzwv4UzghK9Kfl2hJEhcnXpKqHk/mbe8kZhAyeCHPvA0SauhHLSe2QES188CTYpSNx2CP0+5ZL2QmG8R/KiAf77lR5mmA3Uoysg97NBZQeWlsvDFVoqoo7sLSSFMy4ZBqcuDvk/Kory+RR9dtouL/lzdIMPUuN5myKZEEVx5WwKeTT5kv4Jn1ruHUOYmarqT3WuTtU8OksLxbDf73KrBP5N5pmk1jDhaahZJoMaZeyuoXN0RsoyUiOqbGRA2Q66qVwOGH2zsVwjmqSihaiSKskzCsOziNJekyVxbU9Zr6oQxbrRdcc7HCZaDhLOkIq1s1UDlFeniqkcq6BR4gkGhxKAggyo+akePhRWYlRlwX6cbefLrTdaasb03T3nK5UXF90oym/BOD/KdSLMEXol6GWW/ejE0TrOLmrKUIRzC/ERRJj3dehjKm8olZC"
                    },
                    {
                        name: "2026-06-20 Symbio Wildlife Park",
                        thumbnail: "images/2026/06/20/81_thumb.jpg"
                    }
                ];
            }

            console.log("Final folders count:", folders.length);
            processFolders();
        } catch (e) {
            console.error("Discovery failed", e);
            showStatus(true, "Failed to load folders. Please ensure folders.json exists or repo is public.");
        } finally {
            console.log("Discovery complete, hiding status.");
            showStatus(false);
        }
    }

    function processFolders() {
        const data = {};
        folders.forEach(item => {
            const folderName = typeof item === 'string' ? item : item.name;
            const thumbnail = typeof item === 'string' ? null : item.thumbnail;
            
            const match = folderName.match(/^(\d{4})-(\d{2})-(\d{2})(.*)$/);
            if (!match) return;
            
            const [full, y, m, d, desc] = match;
            if (!data[y]) data[y] = {};
            if (!data[y][m]) data[y][m] = [];
            
            // Construct correct thumbnail path
            let thumbUrl = null;
            if (thumbnail && thumbnail.trim() !== "") {
                if (thumbnail.startsWith('data:image')) {
                    thumbUrl = thumbnail; // It's a base64 string
                } else if (thumbnail.startsWith('http')) {
                    thumbUrl = thumbnail;
                } else {
                    // It's a relative path inside the folder. 
                    // WE NEED TO DECODE THE FOLDER NAME FOR LOCAL FILE SYSTEM NAVIGATION
                    thumbUrl = folderName + '/' + thumbnail;
                }
            }
            
            data[y][m].push({
                day: d,
                fullDate: `${y}-${m}-${d}`,
                description: desc.trim(),
                path: encodeURIComponent(folderName) + '/index.html',
                thumbnail: thumbUrl
            });
        });

        renderYears(data);
    }

    function renderYears(data) {
        const container = document.getElementById('year-container');
        container.innerHTML = '';
        const years = Object.keys(data).sort((a, b) => a - b); // Ascending: Earlier first

        years.forEach(year => {
            const btn = document.createElement('button');
            btn.className = 'pill-btn pill-inactive';
            btn.textContent = year;
            btn.onclick = () => {
                state.year = year;
                state.month = null;
                updateActive(container, btn);
                renderMonths(data[year]);
            };
            container.appendChild(btn);
        });

        // Auto-select first year
        if (years.length > 0) container.firstChild.click();
    }

    function renderMonths(monthsData) {
        const section = document.getElementById('month-section');
        const container = document.getElementById('month-container');
        section.classList.remove('hidden');
        container.innerHTML = '';

        const months = Object.keys(monthsData).sort((a, b) => a - b); // Ascending: Earlier first
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        months.forEach(m => {
            const btn = document.createElement('button');
            btn.className = 'pill-btn pill-inactive';
            btn.textContent = monthNames[parseInt(m) - 1];
            btn.onclick = () => {
                state.month = m;
                updateActive(container, btn);
                renderDays(monthsData[m]);
            };
            container.appendChild(btn);
        });

        // Auto-select first month
        if (months.length > 0) container.firstChild.click();
    }

    function renderDays(days) {
        const section = document.getElementById('day-section');
        const container = document.getElementById('day-container');
        section.classList.remove('hidden');
        container.innerHTML = '';

        days.sort((a, b) => a.day - b.day).forEach((story, idx) => { // Ascending
            const card = document.createElement('a');
            card.href = story.path;
            card.className = 'day-card block glassmorphism rounded-2xl group border border-white/5 overflow-hidden flex flex-col sm:flex-row';
            card.style.animationDelay = `${idx * 0.05}s`;

            const hasThumb = story.thumbnail && story.thumbnail.length > 0;
            
            // Container for the image - forced square aspect ratio
            const thumbDiv = document.createElement('div');
            thumbDiv.className = 'w-full sm-thumb aspect-square shrink-0 overflow-hidden bg-gray-900 flex items-center justify-center ring-1 ring-white/10';
            
            if (hasThumb) {
                const img = document.createElement('img');
                img.className = 'w-full h-full object-cover group-hover:scale-110 transition-transform duration-500 opacity-80 group-hover:opacity-100';
                img.onerror = function() {
                    console.error("Image failed to load:", story.thumbnail ? story.thumbnail.substring(0, 50) : 'null');
                    thumbDiv.innerHTML = `<svg class="w-8 h-8 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>`;
                };
                img.src = story.thumbnail;
                thumbDiv.appendChild(img);
            } else {
                thumbDiv.innerHTML = `<svg class="w-8 h-8 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>`;
            }

            card.appendChild(thumbDiv);

            const contentDiv = document.createElement('div');
            contentDiv.className = 'p-6 flex-1 flex flex-col justify-center';
            contentDiv.innerHTML = `
                <div class="flex items-center justify-between gap-4">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-2xl font-black text-white">${story.day}</span>
                            <div class="w-1 h-1 rounded-full bg-purple-500"></div>
                            <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">${story.fullDate}</span>
                        </div>
                        <h3 class="text-lg font-bold text-gray-100 group-hover:text-purple-400 transition-colors">
                            ${story.description || 'View Story'}
                        </h3>
                    </div>
                    <div class="shrink-0 w-10 h-10 rounded-full bg-white/5 flex items-center justify-center group-hover:bg-purple-600 transition-all">
                        <svg class="w-5 h-5 text-gray-400 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                        </svg>
                    </div>
                </div>
            `;
            card.appendChild(contentDiv);
            container.appendChild(card);
        });
    }

    function updateActive(container, activeBtn) {
        container.querySelectorAll('button').forEach(b => {
            b.classList.remove('pill-active');
            b.classList.add('pill-inactive');
        });
        activeBtn.classList.remove('pill-inactive');
        activeBtn.classList.add('pill-active');
    }

    function showStatus(show, text) {
        const container = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');
        if (!container) return;

        if (show) {
            container.classList.remove('hidden');
            if (statusText) statusText.textContent = text;
        } else {
            container.classList.add('hidden');
            // Ensure section visibility when data is loaded
            const yearSection = document.getElementById('year-section');
            if (yearSection) yearSection.classList.remove('hidden');
        }
    }

    init();
</script>

</body>
